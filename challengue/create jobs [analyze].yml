info:
  name: "create jobs [extract+analyze]"
  type: http
  seq: 3

http:
  method: POST
  url: "{{api_url}}/jobs/"
  auth: inherit
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "document_name": "sample.txt",
        "document_type": "text/plain",
        "content": "contenido simulado del documento",
        "pipeline_config": {
          "stages": ["extract", "analyze"],
          "provider_overrides": {
            "extract": "fast",
            "analyze": "fast"
          }
        }
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Prefijo válido: extract → analyze (no se puede pedir solo `analyze`).
