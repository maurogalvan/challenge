info:
  name: "create jobs [extract-enrich]"
  type: http
  seq: 5

http:
  method: POST
  url: "{{api_url}}/jobs/"
  auth: inherit
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "document_name": "sample.txt",
        "document_type": "text/plain",
        "content": "contenido simulado del documento",
        "pipeline_config": {
          "stages": ["extract", "enrich"]
        }
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
