info:
  name: "create jobs [full] all fast"
  type: http
  seq: 7

http:
  method: POST
  url: "{{api_url}}/jobs/"
  auth: inherit
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "document_name": "sample.txt",
        "document_type": "text/plain",
        "content": "contenido simulado del documento",
        "pipeline_config": {
          "stages": ["extract", "analyze", "enrich"],
          "provider_overrides": {
            "extract": "fast",
            "analyze": "fast",
            "enrich": "fast"
          }
        }
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  `analyze`+`enrich` sin `extract` no es válido; se usa el prefijo de tres etapas.
